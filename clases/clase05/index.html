<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>ISW-521 Card</title>
        <link rel="stylesheet" href="styles.css">

    </head>
    <body>
        <main class="pagina">
            <article class="carta">

                <header class="cabecera_carta">
                    <h2 class="carta_curso">ISW-521</h2>
                </header>

                <hr class="linea_dorada">

                <section class="cuerpo_carta">
                    <h3 class="subtitulo_carta">Programación en Ambiente Web I</h3>
                    <p class="descripcion_carta">
                        Aprende a construir aplicaciones web modernas con HTML, CSS y JavaScript.
                    </p>
                    <a class="carta_btn" href="#">Ver curso → </a>
                </section>

                <hr class="linea_blanca">
                    
            </article>

             <footer class="leyenda">
                <ul class="leyenda_lista">
                    <li class="leyenda_item">
                        <span class="leyenda_simbolo leyenda_simbolo--margin"></span>
                        margin: 16px
                    </li>
                    <li class="leyenda_item">
                        <span class="leyenda_simbolo leyenda_simbolo--border"></span>
                        border: 2px
                    </li>
                    <li class="leyenda_item">
                        <span class="leyenda_simbolo leyenda_simbolo--padding"></span>
                        padding: 20px
                    </li>
                    <li class="leyenda_item">
                        <span class="leyenda_simbolo leyenda_simbolo--width"></span>
                        width: 500px exactos
                    </li>
                </ul>
            </footer>

        </main>

    </body>
    
</html>
